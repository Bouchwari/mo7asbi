name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Accept SDK licences
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: '1'

      # Limit to arm64-v8a only — covers 95%+ of modern Android phones
      # Cuts APK size from ~140MB to ~30MB
      - name: Restrict ABI to arm64-v8a
        run: |
          sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' android/app/build.gradle

      # Create a throwaway keystore so we can build a release APK.
      # Release mode: JS bundle always embedded, no Metro dev-server connection.
      - name: Create signing keystore
        run: |
          keytool -genkey -v \
            -keystore hasabi.keystore \
            -alias hasabi \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass hasabi123 -keypass hasabi123 \
            -dname "CN=Hasabi,O=Hasabi,C=MA" 2>/dev/null

      - name: Build release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/hasabi.keystore \
            -Pandroid.injected.signing.store.password=hasabi123 \
            -Pandroid.injected.signing.key.alias=hasabi \
            -Pandroid.injected.signing.key.password=hasabi123
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hasabi-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
