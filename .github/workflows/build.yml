# ─────────────────────────────────────────────────────────────────────────────
# Hasabi — EAS Build CI/CD
#
# Triggers:
#   • push to main  → production AAB  (Play Store)
#   • push to dev   → preview APK     (internal testing)
#
# Required GitHub secret:
#   EXPO_TOKEN  — https://expo.dev/accounts/[user]/settings/access-tokens
# ─────────────────────────────────────────────────────────────────────────────

name: EAS Build

on:
  push:
    branches:
      - main
      - dev

  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Type-check — fast gate before spending EAS credits
  # ──────────────────────────────────────────────────────────────────────────
  type-check:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: tsc --noEmit
        run: npx tsc --noEmit

  # ──────────────────────────────────────────────────────────────────────────
  # 2. EAS Build (only after TypeScript passes)
  # ──────────────────────────────────────────────────────────────────────────
  eas-build:
    name: EAS Build (${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }})
    runs-on: ubuntu-latest
    needs: type-check

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Resolve build profile
        id: profile
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.profile }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "name=production" >> "$GITHUB_OUTPUT"
          else
            echo "name=preview" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (${{ steps.profile.outputs.name }})
        run: >
          eas build
          --platform android
          --profile ${{ steps.profile.outputs.name }}
          --non-interactive
          --no-wait
