# ─────────────────────────────────────────────────────────────────────────────
# Hasabi — Android APK build (no EAS, 100% free GitHub Actions)
#
# Triggers:
#   • push to main  → release APK (signed if keystore secrets are set)
#   • push to dev   → debug APK   (no signing required)
#   • manual run    → choose variant
#
# Optional secrets for signed release builds:
#   ANDROID_KEYSTORE_BASE64   — base64-encoded .jks file
#   ANDROID_STORE_PASSWORD    — keystore password
#   ANDROID_KEY_ALIAS         — key alias inside the keystore
#   ANDROID_KEY_PASSWORD      — key password
#
# The built APK is uploaded as a downloadable artifact on the Actions run page.
# ─────────────────────────────────────────────────────────────────────────────

name: Build APK

on:
  push:
    branches: [main, dev]

  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. TypeScript gate — fails fast before wasting build minutes
  # ──────────────────────────────────────────────────────────────────────────
  type-check:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build APK with Gradle (no EAS)
  # ──────────────────────────────────────────────────────────────────────────
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: type-check

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # Java 17 is required by modern Android Gradle plugin
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install JS dependencies
        run: npm ci

      # Generate the native android/ folder from Expo config
      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      # ── Resolve which variant to build ──────────────────────────────────
      - name: Resolve variant
        id: variant
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.variant }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "name=release" >> "$GITHUB_OUTPUT"
          else
            echo "name=debug" >> "$GITHUB_OUTPUT"
          fi

      # ── Signing setup (only for release, only when secrets exist) ────────
      - name: Decode keystore
        if: steps.variant.outputs.name == 'release' && secrets.ANDROID_KEYSTORE_BASE64 != ''
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/hasabi.keystore

      # ── Gradle build ─────────────────────────────────────────────────────
      - name: Build debug APK
        if: steps.variant.outputs.name == 'debug'
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK (signed)
        if: steps.variant.outputs.name == 'release' && secrets.ANDROID_KEYSTORE_BASE64 != ''
        working-directory: android
        run: >
          ./gradlew assembleRelease --no-daemon
          -Pandroid.injected.signing.store.file=${{ github.workspace }}/android/app/hasabi.keystore
          -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_STORE_PASSWORD }}
          -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }}
          -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build release APK (unsigned — no keystore secrets set)
        if: steps.variant.outputs.name == 'release' && secrets.ANDROID_KEYSTORE_BASE64 == ''
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      # ── Upload artifact ───────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hasabi-${{ steps.variant.outputs.name }}-${{ github.sha }}
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release*.apk
          if-no-files-found: warn
          retention-days: 14
