name: Build APK

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  build:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Node ────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      # ── Java (required by Gradle) ────────────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Gradle cache (saves ~10 min on every run after the first) ────────
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── Install JS deps ──────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── TypeScript check ─────────────────────────────────────────────────
      - name: TypeScript check
        run: npx tsc --noEmit

      # ── Generate native Android project from Expo config ─────────────────
      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      # ── Accept Android SDK licences ──────────────────────────────────────
      - name: Accept Android SDK licences
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # ── Build debug APK (no signing needed) ──────────────────────────────
      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --build-cache

      # ── Upload APK as artifact ────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hasabi-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
