# ─────────────────────────────────────────────────────────────────────────────
# Hasabi — Pull Request gate
#
# Runs on every PR to main or dev. Does NOT trigger an EAS build —
# that only happens on push to those branches after merge.
# ─────────────────────────────────────────────────────────────────────────────

name: PR Check

on:
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  type-check:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: tsc --noEmit
        run: npx tsc --noEmit
